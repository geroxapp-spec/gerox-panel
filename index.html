<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerox Panel</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map { height: 350px; }
</style>
</head>

<body class="bg-[#0B0F19] text-gray-200 min-h-screen font-sans">

<div class="flex min-h-screen">

<!-- SOL MENÜ -->
<aside class="w-64 bg-[#111827] p-6 border-r border-gray-800">
<div class="text-2xl font-black text-orange-500 mb-8">Gerox</div>

<nav class="space-y-2">
<button onclick="switchTab('profile')" class="block w-full text-left bg-orange-600 px-4 py-3 rounded-lg">Profil & Şubeler</button>
<button onclick="switchTab('create')" class="block w-full text-left px-4 py-3 rounded-lg hover:bg-gray-800">Yeni Kampanya</button>
</nav>
</aside>

<!-- SAĞ İÇERİK -->
<main class="flex-1 p-8">

<!-- PROFİL -->
<section id="tab-profile">

<h1 class="text-2xl font-bold mb-6">İşletme Profili</h1>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

<div class="bg-[#111827] p-6 rounded-xl space-y-4">

<input id="business-name" placeholder="İşletme Adı"
class="w-full bg-gray-800 p-3 rounded">

<input id="business-phone" placeholder="Telefon"
class="w-full bg-gray-800 p-3 rounded">

<input id="business-instagram" placeholder="Instagram Link"
class="w-full bg-gray-800 p-3 rounded">

<button onclick="saveBusiness()" class="bg-orange-600 px-6 py-3 rounded font-bold">
Kaydet
</button>

</div>

<div class="bg-[#111827] p-6 rounded-xl">

<h2 class="font-bold mb-4">Şubeler</h2>

<div id="branch-list" class="space-y-2 mb-4">
Yükleniyor...
</div>

<button onclick="openBranchForm()" class="bg-orange-600 px-4 py-2 rounded">
Yeni Şube Ekle
</button>

</div>

</div>
</section>

<!-- ŞUBE FORM MODAL -->
<div id="branch-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">

<div class="bg-[#111827] p-6 rounded-xl w-[700px] space-y-4">

<h2 class="text-xl font-bold">Yeni Şube</h2>

<input id="branch-name" placeholder="Şube Adı"
class="w-full bg-gray-800 p-3 rounded">

<input id="branch-city" placeholder="İl"
class="w-full bg-gray-800 p-3 rounded">

<input id="branch-district" placeholder="İlçe"
class="w-full bg-gray-800 p-3 rounded">

<input id="branch-neighborhood" placeholder="Mahalle"
class="w-full bg-gray-800 p-3 rounded">

<input id="branch-address" placeholder="Açık Adres"
class="w-full bg-gray-800 p-3 rounded">

<div id="map"></div>

<input id="branch-lat" placeholder="Latitude"
class="w-full bg-gray-800 p-3 rounded">

<input id="branch-lng" placeholder="Longitude"
class="w-full bg-gray-800 p-3 rounded">

<div class="flex gap-3">
<button onclick="saveBranch()" class="bg-orange-600 px-4 py-2 rounded">
Kaydet
</button>
<button onclick="closeBranchForm()" class="bg-gray-700 px-4 py-2 rounded">
İptal
</button>
</div>

</div>
</div>

</main>
</div>

<script>
let client = null;
let map;
let marker = null;
let currentBusiness = null;

function switchTab(tab) {
document.querySelectorAll("section").forEach(s => s.classList.add("hidden"));
document.getElementById("tab-" + tab).classList.remove("hidden");
}

async function init() {
const url = localStorage.getItem("gerox_url");
const key = localStorage.getItem("gerox_key");

if (!url || !key) {
alert("Önce bağlantı ayarlarını gir.");
return;
}

const { createClient } = window.supabase;
client = createClient(url, key);

await loadBusiness();
await loadBranches();
}

async function loadBusiness() {
const { data } = await client.from("businesses").select("*").limit(1).single();
if (data) {
currentBusiness = data;
document.getElementById("business-name").value = data.name || "";
document.getElementById("business-phone").value = data.phone || "";
document.getElementById("business-instagram").value = data.instagram || "";
}
}

async function saveBusiness() {
if (!currentBusiness) return;

await client.from("businesses").update({
name: document.getElementById("business-name").value,
phone: document.getElementById("business-phone").value,
instagram: document.getElementById("business-instagram").value
}).eq("id", currentBusiness.id);

alert("Kaydedildi ✅");
}

async function loadBranches() {
const { data } = await client.from("branches").select("*");
const list = document.getElementById("branch-list");
list.innerHTML = "";

if (!data || data.length === 0) {
list.innerHTML = "Şube yok.";
return;
}

data.forEach(b => {
list.innerHTML += `
<div class="bg-gray-800 p-3 rounded">
<b>${b.name}</b><br>
${b.city} / ${b.district}<br>
${b.address}
</div>`;
});
}

function openBranchForm() {
document.getElementById("branch-modal").classList.remove("hidden");

setTimeout(() => {
map = L.map("map").setView([37.9250, 40.2170], 13);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

map.on("click", function(e) {
if (marker) map.removeLayer(marker);
marker = L.marker(e.latlng).addTo(map);
document.getElementById("branch-lat").value = e.latlng.lat;
document.getElementById("branch-lng").value = e.latlng.lng;
});
}, 100);
}

function closeBranchForm() {
document.getElementById("branch-modal").classList.add("hidden");
if (map) map.remove();
}

async function saveBranch() {
if (!currentBusiness) return;

const lat = document.getElementById("branch-lat").value;
const lng = document.getElementById("branch-lng").value;

await client.from("branches").insert({
business_id: currentBusiness.id,
name: document.getElementById("branch-name").value,
city: document.getElementById("branch-city").value,
district: document.getElementById("branch-district").value,
neighborhood: document.getElementById("branch-neighborhood").value,
address: document.getElementById("branch-address").value,
location: `SRID=4326;POINT(${lng} ${lat})`
});

closeBranchForm();
await loadBranches();
alert("Şube eklendi ✅");
}

window.onload = init;
</script>

</body>
</html>

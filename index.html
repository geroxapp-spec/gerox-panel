<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerox - Mağaza Paneli</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-[#0B0F19] text-gray-200 min-h-screen font-sans">

<div class="flex">

<!-- SIDEBAR -->
<aside class="w-64 bg-[#111827] min-h-screen p-6 border-r border-gray-800">
<div class="text-2xl font-black text-orange-500 mb-8">Gerox</div>

<nav class="space-y-3">
<button onclick="switchTab('dashboard')" class="block w-full text-left bg-orange-600 px-4 py-3 rounded-lg">
İndirimler
</button>
<button onclick="switchTab('ayarlar')" class="block w-full text-left px-4 py-3 rounded-lg hover:bg-gray-800">
Bağlantı Ayarları
</button>
</nav>
</aside>

<!-- CONTENT -->
<main class="flex-1 p-8">

<section id="tab-dashboard">

<h1 class="text-2xl font-bold mb-6">Yeni İndirim Ekle</h1>

<div id="setup-warning" class="hidden bg-yellow-900/40 border border-yellow-500 p-4 rounded mb-6">
Önce bağlantı ayarlarını yapmalısın.
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

<div class="bg-[#111827] p-6 rounded-xl space-y-4">

<input id="deal-title" placeholder="Ürün Başlığı"
class="w-full bg-gray-800 p-3 rounded">

<div class="grid grid-cols-2 gap-4">
<input id="deal-old-price" type="number" placeholder="Eski Fiyat"
class="bg-gray-800 p-3 rounded">
<input id="deal-new-price" type="number" placeholder="Yeni Fiyat"
class="bg-gray-800 p-3 rounded">
</div>

<div id="branches-list" class="bg-gray-800 p-4 rounded max-h-40 overflow-y-auto">
Şubeler yükleniyor...
</div>

<button onclick="publishDeal()" id="btn-publish"
class="w-full bg-orange-600 py-3 rounded font-bold">
İndirimi Yayınla
</button>

</div>

<div class="bg-[#111827] p-6 rounded-xl">
<h2 class="text-lg mb-4">Canlı Önizleme</h2>
<div id="preview" class="bg-gray-900 p-4 rounded">
Başlık burada görünecek
</div>
</div>

</div>
</section>

<section id="tab-ayarlar" class="hidden max-w-md space-y-4">

<h1 class="text-xl font-bold">Bağlantı Ayarları</h1>

<input id="cfg-url" placeholder="Supabase URL"
class="w-full bg-gray-800 p-3 rounded">

<input id="cfg-key" type="password" placeholder="Supabase Anon Key"
class="w-full bg-gray-800 p-3 rounded">

<button onclick="saveSettings()" class="bg-orange-600 px-6 py-3 rounded font-bold">
Bağlantıyı Kaydet
</button>

</section>

</main>
</div>

<script>
let client = null;

function switchTab(tab) {
document.getElementById('tab-dashboard').classList.add('hidden');
document.getElementById('tab-ayarlar').classList.add('hidden');
document.getElementById('tab-' + tab).classList.remove('hidden');
}

function saveSettings() {
localStorage.setItem('gerox_url', document.getElementById('cfg-url').value);
localStorage.setItem('gerox_key', document.getElementById('cfg-key').value);
initSupabase();
switchTab('dashboard');
}

function initSupabase() {
const url = localStorage.getItem('gerox_url');
const key = localStorage.getItem('gerox_key');

if (!url || !key) {
document.getElementById('setup-warning').classList.remove('hidden');
return;
}

document.getElementById('setup-warning').classList.add('hidden');

const { createClient } = window.supabase;
client = createClient(url, key);

loadBranches();
}

async function loadBranches() {
if (!client) return;

const { data, error } = await client.from('branches').select('id,name');

const list = document.getElementById('branches-list');
list.innerHTML = '';

if (error) {
list.innerHTML = "Hata: " + error.message;
return;
}

if (!data || data.length === 0) {
list.innerHTML = "Şube bulunamadı.";
return;
}

data.forEach(b => {
list.innerHTML += `
<label class="block mb-2">
<input type="checkbox" value="${b.id}" class="mr-2">
${b.name}
</label>
`;
});
}

async function publishDeal() {
if (!client) {
alert("Bağlantı ayarlarını yap.");
return;
}

const title = document.getElementById('deal-title').value;
const oldPrice = parseFloat(document.getElementById('deal-old-price').value);
const newPrice = parseFloat(document.getElementById('deal-new-price').value);

const checked = Array.from(document.querySelectorAll('#branches-list input:checked')).map(x => x.value);

if (!title || !oldPrice || !newPrice || checked.length === 0) {
alert("Tüm alanları doldur ve şube seç.");
return;
}

const { data: business } = await client.from('businesses').select('id').limit(1).single();

if (!business) {
alert("Business yok.");
return;
}

const { data: deal, error } = await client.from('deals').insert({
business_id: business.id,
title,
old_price: oldPrice,
new_price: newPrice
}).select().single();

if (error) {
alert(error.message);
return;
}

await client.from('deal_branches').insert(
checked.map(id => ({
deal_id: deal.id,
branch_id: id
}))
);

alert("İndirim yayınlandı ✅");
}

window.onload = initSupabase;
</script>

</body>
</html>
